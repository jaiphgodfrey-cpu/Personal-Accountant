abels}\n      </svg>\n    </div>\n  </div>\n\n  <!-- SPENDING BREAKDOWN -->\n  <div class=\"section\">\n    <p class=\"section-title\">Spending Breakdown — This Month</p>\n    <div class=\"card\">${spendBars}</div>\n  </div>\n\n  <!-- TRANSACTIONS -->\n  <div class=\"section\">\n    <p class=\"section-title\">All Transactions</p>\n    <div class=\"card\" style=\"padding:0;overflow:hidden\">\n      <table>\n        <thead><tr>\n          <th>Date</th><th>Type</th><th>Account</th><th>Category</th><th style=\"text-align:right\">Amount</th><th>Note</th>\n        </tr></thead>\n        <tbody>${txRows}</tbody>\n      </table>\n    </div>\n  </div>\n\n  <div class=\"footer\">Personal Accountant · ${localStorage.getItem(\"accountant_user_name\")||\"My Account\"} · ${today}</div>\n</div>\n</body>\n</html>`;\n    setReportHTML(html);\n  };\n  return {\n    lastBackupAt,\n    recordBackup,\n    accounts: activeAccounts,\n    positiveAccounts,\n    allAccounts,\n    explicitLiabs: liabs,\n    liabs: allLiabs,\n    overdraftAccounts,\n    entries: entries.filter(e => e.status !== \"archived\"),\n    totalAssets,\n    totalLiabs,\n    netWorth,\n    monthlyTotals,\n    cashTrend,\n    spendingByPeriod,\n    categoryMonthlyTotals: computedPeriods.categoryMonthlyTotals,\n    incomeTotalByPeriod,\n    expenseTotalByPeriod,\n    addEntry,\n    editEntry,\n    deleteEntry,\n    addAccount,\n    removeAccount,\n    addLiab,\n    removeLiab,\n    backup,\n    restore,\n    downloadBackup,\n    restoreFromPayload,\n    exportHTML,\n    exportCSV,\n    reconciliations,\n    nextId,\n    nextAcctId,\n    addReconciliation,\n    makeLoanPayment,\n    clearAll,\n    CUR_Y,\n    CUR_M,\n    tampered,\n    dataLoaded,\n    budgets,\n    setBudgets,\n    goals,\n    setGoals,\n    setAccountsDirect: setAccounts,\n    setLiabsDirect: setLiabs,\n    setEntriesDirect: setEntries,\n    setNextIdDirect: setNextId,\n    setNextAcctIdDirect: setNextAcctId,\n    setReconciliationsDirect: setReconcilia
